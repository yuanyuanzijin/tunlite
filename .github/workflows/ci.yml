name: CI

# While this repo is in PRIVATE staging, Actions minutes are metered and the
# macOS matrix legs bill at 10x — enough to exhaust the monthly quota in a few
# dozen pushes. Routine push/PR triggers are therefore DISABLED; tests are run
# locally (`node --test`, 341 cases) before every commit instead.
#
# WHEN THIS GOES PUBLIC: standard-runner minutes are free again — restore the
# triggers by uncommenting the block below (and drop `workflow_dispatch` if you
# don't want the manual button).
on:
  workflow_dispatch:        # manual-only during private staging
  # push:
  #   branches: [dev, master]
  # pull_request:

permissions:
  contents: read

jobs:
  test:
    name: node ${{ matrix.node }} · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # Hard cap so a hung test can NEVER run to GitHub's 6-hour default again.
    # (Node 18's `node --test` has no default per-test timeout, so a test that
    # waits on something that never resolves hangs forever; one such macOS job
    # ran 6h = 360min x10 billing = ~3,600 metered minutes from a single job.)
    # The full 341-case suite finishes in well under a minute.
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: node --version
      # tunlite has zero runtime dependencies — nothing to install.
      # Tests sandbox themselves (fake ssh via TUNLITE_SSH, autostart via
      # TUNLITE_FAKE_AUTOSTART) and never touch the real system.
      - name: Run tests
        run: node --test
