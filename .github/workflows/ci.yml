name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:        # manual trigger

permissions:
  contents: read

jobs:
  test:
    name: node ${{ matrix.node }} · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # Hard cap so a hung test can never run to GitHub's 6-hour default.
    # (`node --test` has no default per-test timeout, so a test that waits on
    # something that never resolves would hang forever.) The full 341-case
    # suite finishes in well under a minute.
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: node --version
      # tunlite has zero runtime dependencies — nothing to install.
      # Tests sandbox themselves (fake ssh via TUNLITE_SSH, autostart via
      # TUNLITE_FAKE_AUTOSTART) and never touch the real system.
      - name: Run tests
        run: node --test
