name: Bug report
description: Report a problem with tunlite
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Please fill out the details below so we can
        reproduce it. **Redact any real hostnames, IPs, and secrets.**
  - type: input
    id: version
    attributes:
      label: tunlite version
      description: Output of `tunlite --version`
      placeholder: "0.8.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`
      placeholder: "v20.11.0"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: The commands you ran, in order.
      placeholder: |
        1. tunlite add local web --to user@host --remote 80 --local 8080
        2. tunlite up web
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the error output. Re-run with `--json` if possible.
    validations:
      required: true
